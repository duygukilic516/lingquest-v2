          suggestionPrefix:"Better",
          articleStation:"Article issue",
          verbGo:"Verb tense / verb form",
          beMissing:"Missing be-verb",
          thirdPerson:"Third-person -s",
          auxDo:"Auxiliary do/does issue",
          negation:"Negative form issue",
          pastTime:"Past-time expression with present verb",
          preposition:"Preposition / phrase issue",
          politeness:"Politeness/formality issue"
        },
        German:{
          noIssues:"In deinem Speaking wurde kein klarer Grammatikfehler gefunden. Achte weiter auf vollständige Sätze und Verbposition.",
          transcriptLimited:"Es wurde keine klare Speaking-Antwort erkannt; Grammatik-Feedback ist daher begrenzt.",
          transcriptNote:"Die Grammatik wird anhand deiner Speaking-Antwort bewertet.",
          linePrefix:"Erkannt",
          suggestionPrefix:"Besser",
          ichBin:"Fehlendes Verb",
          verbSecond:"Verbposition",
          modalInf:"Modalverb + Infinitiv",
          casePrep:"Kasus/Präposition",
          article:"Artikel/Kasus",
          dativeFeeling:"Deutsches Gefühlskonstrukt",
          perfect:"Perfektbildung",
          adjective:"Adjektiv-/Endungsproblem",
          politeness:"Höflichkeitsform"
        },
        French:{
          noIssues:"Aucune erreur grammaticale claire n’a été détectée dans ton speaking. Continue à faire des phrases plus complètes.",
          transcriptLimited:"Aucune réponse orale claire n’a été capturée ; le feedback grammatical est donc limité.",
          transcriptNote:"La grammaire est évaluée à partir de ta réponse orale.",
          linePrefix:"Capturé",
          suggestionPrefix:"Mieux",

    function stripAccentsForGrammar(s){
      return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    }

    function grammarClean(text){
      return stripAccentsForGrammar(String(text || "").toLowerCase())
        .replace(/[^\p{L}\p{N}\s'-]/gu," ")
        .replace(/\s+/g," ")
        .trim();
    }

    function issueLine(type, line, suggestion, explanation=""){
      const G = grammarLabels();
      const captured = line ? `“${line.length>130 ? line.slice(0,130)+"..." : line}”` : "";
      return `${type}: ${G.linePrefix}: ${captured} → ${G.suggestionPrefix}: ${suggestion}${explanation ? " — " + explanation : ""}`;
    }

    function detectSpeakingGrammarIssues(lines, t){
      const G = grammarLabels();
      const serviceTopic = ["restaurant_order","grocery_shopping","make_reservation","change_appointment","hotel","coffee"].includes(t.id);
      const cleanLines = (lines||[]).map(x=>String(x||"").trim()).filter(Boolean);
      if(!cleanLines.length) return [G.transcriptLimited];

      const issues = [];

      cleanLines.forEach(line=>{
        const l = grammarClean(line);
        if(!l) return;

        if(targetLanguage()==="English"){
          if(/\bwhere (is )?(station|restaurant|metro|bathroom|toilet|class|office)\b/.test(l) && !/\bwhere is the\b/.test(l)){
            issues.push(issueLine(G.articleStation, line, "Where is the station / restaurant / office?", "Add “the” before a specific place."));
          }
          if(/\bi (am )?go(ing)? (school|work|home|restaurant|office)\b/.test(l) || /\bi am go\b/.test(l)){
            issues.push(issueLine(G.verbGo, line, "I’m going to school / work / the office.", "Use “am going to” for a current/future plan."));
          }
          if(/\byesterday\b.*\b(i go|i eat|i buy|i see|i meet|i do|i have)\b/.test(l) || /\b(i go|i eat|i buy|i see|i meet|i do|i have)\b.*\byesterday\b/.test(l)){
            issues.push(issueLine(G.pastTime, line, "Yesterday I went / ate / bought / saw / met / did / had...", "A past-time word normally needs a past verb."));
          }
          if(/\bi (new|student|from|tired|sick|ready|late|hungry)\b/.test(l)){
            issues.push(issueLine(G.beMissing, line, "I’m new / I’m a student / I’m from...", "Add the verb “be”."));
          }
          if(/\b(he|she|it) (work|want|go|like|need|have|say|make)\b/.test(l)){
            issues.push(issueLine(G.thirdPerson, line, "He works / she wants / it goes...", "Add -s with he/she/it in the present simple."));
          }
          if(/\b(he|she|it) don t\b|\bdoesn t (likes|wants|needs|goes|works)\b/.test(l)){
            issues.push(issueLine(G.auxDo, line, "He doesn’t like... / She doesn’t want...", "Use “doesn’t + base verb”."));
          }
          if(/\bi no (like|want|need|understand|have)\b|\bi not (like|want|need|understand|have)\b/.test(l)){
            issues.push(issueLine(G.negation, line, "I don’t like / want / need / understand...", "Use “don’t + base verb”."));
          }
          if(/\bdepend of\b/.test(l)){
            issues.push(issueLine(G.preposition, line, "It depends on...", "The phrase is “depend on”, not “depend of”."));
          }
          if(serviceTopic && /\bi want\b/.test(l)){
            issues.push(issueLine(G.politeness, line, "I’d like... / Could I have...?", "In service situations, “I want” can sound too direct."));
          }
        }

        if(targetLanguage()==="German"){
          if(/\bich (neu|student|krank|fertig|mude|muede|spat|spaet|alex|aus)\b/.test(l)){
            issues.push(issueLine(G.ichBin, line, "Ich bin neu / krank / müde / aus der Türkei.", "German needs a finite verb."));
          }
          if(/\b(heute|morgen|dann|deshalb|vielleicht|jetzt|spater|spaeter) ich (gehe|komme|mache|bin|habe|mochte|möchte|will|kann|muss)\b/.test(l)){
            issues.push(issueLine(G.verbSecond, line, "Morgen gehe ich... / Deshalb bin ich...", "After a fronted adverb, the verb comes before the subject."));
          }
          if(/\bich (kann|muss|will|mochte|möchte|wurde|würde) (gehe|komme|mache|reserviere|bestelle|kaufe|spreche)\b/.test(l)){
            issues.push(issueLine(G.modalInf, line, "Ich möchte einen Tisch reservieren. / Ich kann später kommen.", "After a modal verb, use the infinitive at the end."));
          }
          if(/\bich habe (kalt|warm|hunger|durst)\b/.test(l)){
            issues.push(issueLine(G.dativeFeeling, line, "Mir ist kalt/warm. / Ich habe Hunger/Durst.", "For temperature feelings, German uses “mir ist...”"));
          }
          if(/\bich bin (gehe|komme|mache|kaufe|esse|trinke)\b/.test(l)){
            issues.push(issueLine(G.perfect, line, "Ich bin gegangen/gekommen OR ich gehe/komme.", "Do not combine “bin” with the simple present verb."));
          }
          if(serviceTopic && /\b(fur|für) (zwei|drei|vier|funf|fünf) person\b/.test(l)){
            issues.push(issueLine(G.casePrep, line, "Für zwei/drei/vier Personen.", "Use plural “Personen”."));
          }
          if(serviceTopic && /\bauf (name|den name)\b/.test(l)){
            issues.push(issueLine(G.casePrep, line, "Auf den Namen Alex Morgan.", "The fixed service phrase is “auf den Namen”."));
          }
          if(serviceTopic && /\bich (nehme|suche|brauche|mochte|möchte) (tisch|wasser|termin|suppe|brot|kaffee|apfel|äpfel)\b/.test(l)){
            issues.push(issueLine(G.article, line, "Ich nehme die Suppe / ein Wasser / einen Termin.", "German usually needs the correct article and case."));
          }
          if(/\bich bin gut\b/.test(l) && !/\bich bin gut in\b/.test(l)){
            issues.push(issueLine(G.adjective, line, "Mir geht es gut. / Ich bin gut in Deutsch.", "“Ich bin gut” alone usually means skilled, not feeling well."));
          }
        }

        if(targetLanguage()==="French"){
          if(/\bje (nouveau|etudiant|fatigue|malade|content|turc|francais|alex)\b/.test(l)){
            issues.push(issueLine(G.jeSuis, line, "Je suis nouveau/nouvelle. / Je suis étudiant(e). / Je m’appelle Alex.", "French needs “suis” or another conjugated verb."));
          }
          if(/\bje suis (chaud|froid|faim|soif)\b/.test(l)){
            issues.push(issueLine(G.feeling, line, "J’ai chaud/froid/faim/soif.", "French uses “avoir” for these sensations."));
          }
          if(/\bje suis \d{1,2} ans\b/.test(l)){
            issues.push(issueLine(G.age, line, "J’ai 20 ans.", "Age uses “avoir”, not “être”."));
          }
          if(/\bje aime\b|\bje ai\b|\bje habite\b/.test(l)){
            issues.push(issueLine(G.contraction, line, "J’aime / j’ai / j’habite.", "Use elision before a vowel."));
          }
          if(/\bje (aime|veux|comprends|parle|prends) pas\b|\bj (aime|veux|comprends|parle|prends) pas\b/.test(l)){
            issues.push(issueLine(G.negation, line, "Je n’aime pas / je ne veux pas / je ne comprends pas.", "For full written grammar, use “ne ... pas”."));
          }
          if(serviceTopic && /\b(je prends|je voudrais|je cherche|je veux) (pain|eau|table|rendez|rendez-vous|soupe|plat|sac|cafe|café)\b/.test(l)){
            issues.push(issueLine(G.article, line, "Je voudrais du pain / de l’eau / une table / un rendez-vous.", "French usually needs an article or partitive."));
          }
          if(/\b(un|deux|trois|quatre|cinq|kilo|bouteille|peu|beaucoup) (pomme|pommes|eau|pain|personnes|table)\b/.test(l) && !/\b(de|d')\b/.test(l)){
            issues.push(issueLine(G.deAfterQuantity, line, "un kilo de pommes / une bouteille d’eau / beaucoup de pain.", "After quantities, French often uses “de/d’”."));
          }
          if(serviceTopic && /\bje veux\b/.test(l)){
            issues.push(issueLine(G.politeConditional, line, "Je voudrais... / Est-ce que je pourrais... ?", "In service situations, conditional sounds more polite."));
          }
          if(/\bmon table\b|\bun table\b/.test(l)){
            issues.push(issueLine(G.gender, line, "ma table / une table.", "“Table” is feminine."));
          }
        }
      });

      const unique = Array.from(new Set(issues));
      return unique.length ? unique.slice(0,7) : [G.noIssues];
    }

    function localizedWeak(summary){
      const F = fbText();
      return summary.blankCorrect < summary.blankTotal ? F.grammarCtx :
             summary.quizCorrect < summary.quizTotal ? F.listeningDetail :
             F.speakingExpansion;
    }

    function localizedSpeechFeedback(lines, t){
      const F = fbText();
      const issues = [];
      const upgrades = [];
      const patterns = [];
      if(!lines.length){
        return {issues:[F.mistakesNoSpeech], upgrades:[F.usePhrase((t.phrases||["Could I...?"])[0])], patterns:[], strongLine:""};
      }
      const shortLines = lines.filter(x => x.split(/\s+/).filter(Boolean).length < 5);
      if(shortLines.length){
        issues.push(F.mistakesShort);
        upgrades.push(F.improveDetail);
      }
      const serviceTopic = ["restaurant_order","grocery_shopping","make_reservation","change_appointment","hotel","coffee"].includes(t.id);
      const all = cleanWords(lines.join(" "));
      if(serviceTopic){
        const politeRegex = targetLanguage()==="German" ? /\b(bitte|danke|gern|gerne|hätte|könnte|möchte|entschuldigung)\b/g :
                            targetLanguage()==="French" ? /\b(s'il vous plaît|merci|voudrais|pourrais|excusez|pardon|bien sûr)\b/g :
                            /\b(please|thank|thanks|could|would|may i|excuse me|appreciate)\b/g;
        if(!((all.match(politeRegex)||[]).length)){
          issues.push(F.mistakesService);
          upgrades.push(F.usePhrase((t.phrases||[])[0] || ""));
        }
      }
      const phraseHits = (t.phrases||[]).filter(p => {
        const key = cleanWords(p).split(" ").filter(Boolean).slice(0,4).join(" ");
        return key && all.includes(key);
      });
      if(phraseHits.length){
        patterns.push(phraseHits.slice(0,2).join(" · "));
      }else{
        patterns.push(F.usePhrase((t.phrases||[])[0] || ""));
      }
      const longest = lines.slice().sort((a,b)=>b.length-a.length)[0] || "";
      return {
        issues: issues.length ? issues : [targetLanguage()==="German" ? "Keine großen Fehler erkannt. Der nächste Schritt ist längeres und natürlicheres Sprechen." : targetLanguage()==="French" ? "Aucune grande erreur détectée. La prochaine étape est de parler plus longuement et plus naturellement." : "No major issue detected. Next step is longer and more natural speaking."],
        upgrades: upgrades.length ? upgrades : [F.improveDetail],
        patterns,
        strongLine: longest
      };
    }

    function localFeedback(){
      const t=topic();
      const F = fbText();
      const summary=getResultSummary();
      const userLines = state.messages.filter(m=>m.role==="user").map(m=>m.text).filter(Boolean);
      const realLines = userLines.filter(x => !x.includes("recorded"));
      const wordCount = realLines.join(" ").split(/\s+/).filter(Boolean).length;
      const avgWords = realLines.length ? Math.round(wordCount / realLines.length) : 0;
      const speech = targetLanguage()==="English" ? analyzeUserSpeechLines(realLines, t) : localizedSpeechFeedback(realLines, t);
      const grammarIssues = detectSpeakingGrammarIssues(realLines, t);
      const activityWeakest = localizedWeak(summary);
      const levelTarget = levelBlueprint[state.level]?.target || F.levelTarget;
      const communication = realLines.length ? F.communication(state.conversationTurn, avgWords, t.title) : F.noTranscript;
      const listening = F.listening(summary.quizCorrect, summary.quizTotal, summary.blankCorrect, summary.blankTotal, summary.matchCorrect, summary.matchTotal, activityWeakest);
      const naturalUpgrade = (speech.upgrades && speech.upgrades[0]) || F.usePhrase((t.phrases||["Could I...?"])[0]);
      const personalNote = speech.strongLine ? F.bestLine(`${speech.strongLine.slice(0,140)}${speech.strongLine.length>140?"...":""}`) : F.noLine;

      return {
        communication,
        listening,
        naturalUpgrade,
        personalNote,
        nextStep:F.nextStep(levelTarget, activityWeakest),
        mistakes:speech.issues,
        betterAlternatives:speech.upgrades,
        grammarIssues,
        usefulPhrases:(t.phrases||[]).slice(0,4).concat(speech.patterns||[]).slice(0,6),
        developmentPoints:[
          F.improveDetail,
          F.improveLevel[state.level] || F.levelTarget,
          F.reviewWeak(activityWeakest)
        ]
      };
    }


    async function requestAIFeedback(){
      if(state.feedbackRequested) return;
      state.feedbackRequested = true;
      const fallback = localFeedback();
      setState({aiFeedback:fallback, feedbackRequested:true});


      if(!remoteFeedbackAvailable || location.protocol === "file:") return;
      try{
        const t=topic();
        const summary=getResultSummary();
        const res = await fetch("/api/feedback", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            topic:t.title,
            topicId:t.id,
            level:state.level,
            targetLanguage:targetLanguage(),
            exerciseMode:state.exerciseMode || (state.quickMode?"short_listening_practice_3_4":"full_speaking_5_7"),
            summary,
            messages:state.messages,
            phrases:t.phrases
          })
        });
        if(!res.ok){ remoteFeedbackAvailable=false; return; }
        const data = await res.json();
        if(data && data.feedback){
          setState({aiFeedback:data.feedback, feedbackRequested:true});
        }
      }catch(e){
        remoteFeedbackAvailable=false;
      }
    }

    function practiceDeepAnalysis(t, summary){
      const D = deepFeedbackText();
      const missedQuiz = t.quiz.map((q,i)=>Number(state.quizAnswers[i])!==q.answer ? Object.assign({kind:D.categories.listening}, q) : null).filter(Boolean);
      const missedBlanks = t.blanks.map((q,i)=>Number(state.blanks[i])!==q.answer ? Object.assign({kind:D.categories.grammar}, q) : null).filter(Boolean);
      const missedMatches = t.matching.filter((_,i)=>state.matches[i]===undefined).map(m=>({kind:D.categories.vocabulary, q:m[0], options:[m[1]], answer:0, why:`${m[0]} = ${m[1]}`}));

      const total = summary.quizTotal + summary.blankTotal + summary.matchTotal;
      const correct = summary.quizCorrect + summary.blankCorrect + summary.matchCorrect;
      const pct = total ? Math.round((correct/total)*100) : 0;

      const quizPct = summary.quizTotal ? Math.round((summary.quizCorrect/summary.quizTotal)*100) : 0;
      const grammarPct = summary.blankTotal ? Math.round((summary.blankCorrect/summary.blankTotal)*100) : 0;
      const vocabPct = summary.matchTotal ? Math.round((summary.matchCorrect/summary.matchTotal)*100) : 0;
      const weakest = quizPct <= grammarPct && quizPct <= vocabPct ? D.categories.listening :
                      grammarPct <= vocabPct ? D.categories.grammar : D.categories.vocabulary;

      const review = missedQuiz.slice(0,2).concat(missedBlanks.slice(0,2), missedMatches.slice(0,2)).slice(0,5);
      return {pct, correct, total, quizPct, grammarPct, vocabPct, weakest, review, missedQuiz, missedBlanks, missedMatches};
    }

    function speakingDeepAnalysis(lines, t){
      const D = deepFeedbackText();
      const words = lines.join(" ").split(/\s+/).filter(Boolean);
      const turns = lines.length;
      const avgWords = turns ? Math.round(words.length / turns) : 0;
      const grammarIssues = detectSpeakingGrammarIssues(lines, t);
      const limited = !turns || grammarIssues.some(x => x === grammarLabels().transcriptLimited);
      const realGrammarIssues = limited ? [] : grammarIssues.filter(x => !/No clear|No spoken|not detected|kein klarer|keine.*fehler|Aucun transcript|Aucune erreur|aucune erreur/i.test(x));

      const all = cleanWords(lines.join(" "));
      const phrases = (t.phrases||[]).slice(0,6);
      const phraseHits = phrases.filter(p => {
        const key = cleanWords(p).split(" ").filter(Boolean).slice(0,4).join(" ");
        return key && all.includes(key);
      });

      const connectorRegex = targetLanguage()==="German" ? /\b(aber|weil|denn|deshalb|wenn|obwohl|damit|und|oder)\b/g :
                             targetLanguage()==="French" ? /\b(mais|parce que|donc|si|quand|même si|alors|et|ou)\b/g :
                             /\b(because|so|but|although|if|when|and|or)\b/g;
      const connectors = (all.match(connectorRegex)||[]).length;

      const shortTurns = lines.filter(x => x.split(/\s+/).filter(Boolean).length < 5).length;
      let score = 100;
      score -= realGrammarIssues.length * 18;
      score -= Math.min(shortTurns,4) * 8;
      if(turns && avgWords < (state.level==="Beginner" ? 4 : state.level==="Intermediate" ? 7 : 9)) score -= 10;
      if(state.level !== "Beginner" && connectors < 2) score -= 8;
      if(!phraseHits.length) score -= 8;
      if(limited) score = 0;
      score = Math.max(0, Math.min(100, Math.round(score)));

      const longest = lines.slice().sort((a,b)=>b.length-a.length)[0] || "";
      const upgrade = realGrammarIssues[0] || (phraseHits.length ? D.targetPhraseAdvice(phraseHits.length, phrases.length || 1) : D.targetPhraseAdvice(0, phrases.length || 1));
      return {score, turns, avgWords, grammarIssues, realGrammarIssues, phraseHits, phraseTotal:phrases.length, connectors, shortTurns, bestLine:longest, upgrade, limited};
    }

    function compactScoreClass(pct){
      if(pct >= 80) return "good";
      if(pct >= 55) return "blue";
      return "warn";
    }

      const practice = practiceDeepAnalysis(t, summary);
      const userLines = (state.messages||[]).filter(m=>m.role==="user").map(m=>m.text).filter(Boolean).filter(x=>!x.includes("recorded"));

      if(!state.feedbackTracked){
        state.feedbackTracked = true;
        updateSession({
          feedbackViewed:true,
          feedbackAt:new Date().toISOString(),
          quickMode:state.quickMode,
          exerciseMode:state.exerciseMode || (state.quickMode?"short_listening_practice_3_4":"full_speaking_5_7"),
          targetLanguage:targetLanguage(),
          level:state.level,
          topic:state.topicId,
          topicTitle:t.title,
          activitySummary:activityTrackingSummary(),
          feedbackSummary:{
            overallPercent:overallPct,
            practicePercent:practice.pct,
            speakingGrammarPercent:state.quickMode ? null : speaking.score,
            speakingTurns:state.quickMode ? 0 : speaking.turns,
            avgWordsPerTurn:state.quickMode ? 0 : speaking.avgWords,
            targetPhraseHits:state.quickMode ? null : speaking.phraseHits.length,

      const topInsight = state.quickMode
        ? D.activityInsight(practice.pct, practice.weakest)
        : `${D.activityInsight(practice.pct, practice.weakest)} ${D.speakingInsight(speaking.score, speaking.turns)}`;

      const phraseLine = state.quickMode
        ? (t.phrases||[]).slice(0,3)
        : (speaking.phraseHits.length ? speaking.phraseHits : (t.phrases||[]).slice(0,3));

      $("screen").innerHTML = card(`
        <div class="mission compact-feedback-head">

            <h2>${state.quickMode ? D.quickTitle : D.compactTitle}</h2>

          </div>
        </div>

        <div class="insight-row compact-score-row">
          <div class="insight-pill ${compactScoreClass(overallPct)}"><b>${D.overall}</b><p>${overallPct}%</p></div>
          <div class="insight-pill ${compactScoreClass(practice.pct)}"><b>${D.activity}</b><p>${practice.correct}/${practice.total}</p></div>
          ${state.quickMode ? `<div class="insight-pill blue"><b>${D.targetPhrases}</b><p>${esc((t.phrases||[""])[0] || "")}</p></div>` : `
            <div class="insight-pill ${compactScoreClass(speaking.score)}"><b>${D.speakingGrammar}</b><p>${speaking.limited ? "—" : speaking.score+"%"}</p></div>
          `}
        </div>

        <div class="feedback-section compact-section">
          <h3>🎯 ${D.keyInsight}</h3>
          <p>${esc(topInsight)}</p>
          ${!state.quickMode ? `<p style="margin-top:8px"><b>${D.phraseUse}:</b> ${esc(D.targetPhraseAdvice(speaking.phraseHits.length, speaking.phraseTotal || 1))}</p>`:""}
        </div>

        <div class="feedback-grid compact-two-col">
          <div class="feedback-item">
            <b>📚 ${D.practiceReview}</b>
            <div class="mini-score-grid compact-mini">
              <div class="mini-score"><b>${D.categories.listening}</b><span>${summary.quizCorrect}/${summary.quizTotal}</span></div>
              <div class="mini-score"><b>${D.categories.vocabulary}</b><span>${summary.matchCorrect}/${summary.matchTotal}</span></div>
              <div class="mini-score"><b>${D.categories.grammar}</b><span>${summary.blankCorrect}/${summary.blankTotal}</span></div>
            </div>
            <ul class="feedback-list compact-list">${practiceReviewHTML}</ul>
          </div>

          <div class="feedback-item">
            <b>🗣️ ${state.quickMode ? D.nextStep : D.speakingReview}</b>
            ${state.quickMode ? `
              <p>${esc(D.targetPhraseAdvice(0, (t.phrases||[]).length || 1))}</p>
              ${chips((t.phrases||[]).slice(0,4))}
            ` : `
              <p><b>${D.grammarNotes}:</b></p>
              <ul class="feedback-list compact-list">${speakingGrammarHTML}</ul>
              <p style="margin-top:8px"><b>${D.bestLine}:</b> ${speaking.bestLine ? `“${esc(speaking.bestLine.slice(0,150))}${speaking.bestLine.length>150?"...":""}”` : "—"}</p>
            `}
          </div>
        </div>

        <details class="feedback-section compact-section" style="margin-top:14px">
          <summary><b>🔎 ${D.details}</b></summary>
          <div style="margin-top:12px">
            <p><b>${D.practiceReview}</b></p>
            <ul class="feedback-list compact-list">${practiceReviewHTML}</ul>
            ${!state.quickMode ? `
              <p style="margin-top:12px"><b>${D.speakingReview}</b></p>
              <ul class="feedback-list compact-list">
                <li>${D.speakingGrammar}: ${speaking.limited ? "—" : speaking.score+"%"} · ${speaking.turns} turn(s)</li>
                <li>${D.targetPhrases}: ${speaking.phraseHits.length}/${speaking.phraseTotal || 1}</li>
                <li>${D.suggested}: ${esc(speaking.upgrade)}</li>
              </ul>
            `:""}
          </div>
        </details>

          <h3>✨ ${D.targetPhrases}</h3>
          ${chips(phraseLine.length ? phraseLine : (t.phrases||[]).slice(0,4))}
        </div>

        <div style="display:grid;gap:10px;margin-top:18px">
          ${state.quickMode ? `<button class="btn primary" id="qfTryFull" style="justify-content:center">${D.tryFull}</button>` : ""}
          <button class="btn secondary" id="feedbackNext" style="justify-content:center">${D.seeProgress}</button>
        </div>
      `);

      const tryFull = $("qfTryFull");
      if(tryFull){
        tryFull.addEventListener("click",()=>{
          setState({quickMode:false, conversationStarted:false, conversationTurn:0, messages:[], aiFeedback:null, feedbackRequested:false, step:6});
        });
      }
      $("feedbackNext").addEventListener("click",nextStep);
      requestAIFeedback();
    }

      const t=topic();
      $("screen").innerHTML = card(`<div class="center" style="max-width:760px;margin:0 auto">
          <div style="display:flex;justify-content:center;margin-bottom:16px">${novaHTML(false)}</div>

          <div class="tip" style="text-align:left"><b>Nova:</b><span>You are one step closer to using ${esc(langLabel())} outside the app. Save this progress and continue with the next scenario.</span></div>

    function render(){
      $("progressBar").style.width = progress()+"%";
      if(state.step===0) renderWelcome();
      if(state.step===1) renderLanguage();
      if(state.step===2) renderLevel();
      if(state.step===3) renderTopic();
      if(state.step===4) renderListening();
      if(state.step===5) renderActivities();
      if(state.step===6) renderConversation();
      if(state.step===7) renderFeedback();
      if(state.step===8) renderFinal();
    }


    window.addEventListener("beforeunload", stopAllAudio);
    render();
