<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingQuest Demo v43 Live Stats Flow</title>
  <style>
    :root{
      --ink:#17130f; --muted:#6f655b; --paper:#fbf6ee; --card:rgba(255,255,255,.76);
      --line:rgba(23,19,15,.12); --warm:#ffd989; --sky:#b9e3f4; --green:#1f8f56;
      --rose:#f5c5c7; --deep:#17130f; --soft:#efe7dc;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(255,217,137,.75), transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(185,227,244,.7), transparent 34%),
        radial-gradient(circle at 70% 94%, rgba(245,197,199,.55), transparent 35%),
        var(--paper);
    }
    button,input{font:inherit}
    button{border:0;cursor:pointer}
    .app{width:min(1140px,100%);margin:0 auto;min-height:100vh;padding:22px;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{height:48px;width:48px;border-radius:19px;background:var(--deep);color:white;display:grid;place-items:center;box-shadow:0 16px 34px rgba(23,19,15,.18)}
    .brand-title{font-weight:850;font-size:20px;letter-spacing:-.4px}
    .brand-sub{font-size:12px;color:var(--muted)}
    .chip{display:inline-flex;align-items:center;gap:8px;border-radius:999px;background:rgba(255,255,255,.72);padding:10px 14px;color:var(--muted);box-shadow:0 10px 24px rgba(60,45,25,.08)}
    .top-guide{position:fixed;right:22px;top:84px;z-index:70;display:flex;align-items:flex-start;gap:10px;pointer-events:none}
    .guide-mascot{width:70px;height:78px;position:relative;border-radius:42% 42% 38% 38%/46% 46% 44% 44%;background:linear-gradient(145deg,#9c7cff 0%,#7f5cff 48%,#ffb36b 100%);box-shadow:0 18px 38px rgba(23,19,15,.18), inset 0 -10px 22px rgba(40,10,110,.12);animation:guideFloat 4s ease-in-out infinite}
    .guide-mascot:before{content:"";position:absolute;left:50%;top:-25px;width:5px;height:33px;background:#7f5cff;border-radius:99px;transform:translateX(-50%)}
    .guide-mascot:after{content:"";position:absolute;left:50%;top:-34px;width:24px;height:24px;background:#ffd166;border-radius:50%;transform:translateX(-50%);box-shadow:0 0 18px rgba(255,209,102,.7)}
    .guide-eye{position:absolute;top:25px;width:24px;height:28px;border-radius:50%;background:white;z-index:2}
    .guide-eye.left{left:12px}.guide-eye.right{right:12px}
    .guide-eye.left:after,.guide-eye.right:after{content:"";position:absolute;left:8px;top:9px;width:8px;height:10px;border-radius:99px;background:#17130f}
    .guide-blush{position:absolute;top:49px;width:18px;height:9px;border-radius:99px;background:rgba(255,126,139,.55);z-index:3}
    .guide-blush.left{left:13px}.guide-blush.right{right:13px}
    .guide-mouth{position:absolute;left:50%;top:47px;transform:translateX(-50%);width:28px;height:14px;border-bottom:3px solid #17130f;border-radius:0 0 99px 99px;z-index:3}
    .guide-wing{position:absolute;top:43px;width:20px;height:30px;background:#8666ff;border-radius:50%;z-index:-1}
    .guide-wing.left{left:-8px;transform:rotate(-22deg)}.guide-wing.right{right:-8px;transform:rotate(22deg)}
    .guide-foot{position:absolute;bottom:-5px;width:18px;height:8px;background:#ffb36b;border-radius:99px}
    .guide-foot.left{left:18px}.guide-foot.right{right:18px}
    .guide-spark{position:absolute;right:-8px;top:-8px;color:#ffd166;font-size:20px;animation:pulse 2s ease-in-out infinite}
    @keyframes guideFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
    .guide-bubble{display:none}
    .tip-overlay{position:fixed;inset:0;z-index:120;background:rgba(247,243,236,.78);backdrop-filter:blur(12px);display:none;place-items:center;padding:22px}
    .tip-overlay.show{display:grid;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .tip-card{width:min(620px,100%);background:white;border:1px solid rgba(23,19,15,.1);border-radius:32px;padding:28px;box-shadow:0 30px 90px rgba(60,45,25,.18);display:grid;grid-template-columns:86px 1fr;gap:18px;align-items:center}
    .tip-card p{margin:6px 0 0;color:#5c5148}
    .tip-card .mini-nova{transform:scale(1.05)}
    .system-alert{position:fixed;left:50%;bottom:24px;z-index:150;transform:translateX(-50%) translateY(20px);max-width:680px;background:#17130f;color:white;border-radius:18px;padding:14px 18px;box-shadow:0 20px 60px rgba(23,19,15,.24);opacity:0;pointer-events:none;transition:.22s}
    .system-alert.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .progress-shell{height:9px;background:rgba(255,255,255,.65);border-radius:999px;margin:18px 0 4px;overflow:hidden}
    #progressBar{height:100%;background:linear-gradient(90deg,#17130f,#5b4d3f);width:0%;transition:width .45s cubic-bezier(.2,.8,.2,1)}
    main{flex:1;display:grid;place-items:center;padding:26px 0 34px}
    .card{width:min(860px,100%);border:1px solid rgba(255,255,255,.82);background:var(--card);backdrop-filter:blur(18px);border-radius:36px;box-shadow:0 26px 70px rgba(80,60,30,.16);padding:30px;animation:rise .28s ease}
    @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    h1{font-size:clamp(42px,7vw,74px);line-height:.94;letter-spacing:-2.4px;margin:18px 0 16px}
    h2{font-size:clamp(30px,4vw,44px);line-height:1;letter-spacing:-1.2px;margin:0}
    h3{font-size:20px;margin:0 0 10px}
    p{line-height:1.62;color:var(--muted)}
    .center{text-align:center}
    .actions{display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap;margin-top:26px}
    .actions.center{justify-content:center}
    .btn{border-radius:19px;padding:14px 20px;font-weight:780;transition:.18s transform,.18s opacity,.18s background;display:inline-flex;align-items:center;gap:9px}
    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .primary{background:var(--deep);color:white;box-shadow:0 16px 34px rgba(23,19,15,.19)}
    .secondary{background:white;color:var(--ink);box-shadow:0 10px 24px rgba(60,45,25,.08)}
    .ghost{background:rgba(255,255,255,.5);color:var(--ink);border:1px solid var(--line)}
    .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:28px;align-items:center}
    .nova-wrap{position:relative;min-height:350px;display:grid;place-items:center}
    .orb{position:absolute;border-radius:999px;filter:blur(0);opacity:.95}
    .orb.o1{width:165px;height:165px;background:#ffe5a8;left:10px;top:20px}
    .orb.o2{width:120px;height:120px;background:#b9e3f4;right:18px;bottom:26px}
    .nova{
      width:min(270px,84%);aspect-ratio:.86;position:relative;border-radius:46% 46% 42% 42%/38% 38% 52% 52%;
      background:linear-gradient(150deg,#ffefc7 0%,#ffd989 46%,#f7b86e 100%);
      box-shadow:0 30px 80px rgba(23,19,15,.2), inset 0 -18px 32px rgba(116,72,24,.08);
      animation:float 4s ease-in-out infinite;
    }
    .nova:before{content:"";position:absolute;left:50%;top:-26px;width:54px;height:54px;transform:translateX(-50%) rotate(12deg);border-radius:18px 18px 22px 22px;background:#17130f;box-shadow:0 10px 24px rgba(23,19,15,.18)}
    .nova:after{content:"";position:absolute;left:50%;top:-44px;width:5px;height:36px;background:#17130f;border-radius:99px;transform:translateX(-50%)}
    .nova-eye{position:absolute;top:34%;width:28px;height:34px;border-radius:50%;background:#17130f;box-shadow:inset 6px 7px 0 rgba(255,255,255,.33)}
    .nova-eye.left{left:31%}.nova-eye.right{right:31%}
    .nova-cheek{position:absolute;top:48%;width:30px;height:14px;border-radius:99px;background:rgba(255,135,128,.42);filter:blur(.2px)}
    .nova-cheek.left{left:22%}.nova-cheek.right{right:22%}
    .nova-mouth{position:absolute;left:50%;top:48%;transform:translateX(-50%);width:46px;height:24px;border-bottom:5px solid #17130f;border-radius:0 0 999px 999px}
    .nova-arm{position:absolute;top:55%;width:42px;height:15px;background:#f7b86e;border-radius:99px}
    .nova-arm.left{left:-20px;transform:rotate(-25deg)}.nova-arm.right{right:-20px;transform:rotate(25deg)}
    .nova-foot{position:absolute;bottom:-10px;width:50px;height:22px;border-radius:99px;background:#17130f}
    .nova-foot.left{left:58px}.nova-foot.right{right:58px}
    .nova-star{position:absolute;right:12%;top:12%;font-size:30px;color:#17130f;animation:pulse 2s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-12px) rotate(1deg)}}
    @keyframes pulse{50%{transform:scale(1.15);opacity:.78}}
    .speech{position:absolute;right:0;top:10px;max-width:270px;background:white;padding:14px 16px;border-radius:22px;box-shadow:0 18px 40px rgba(80,60,30,.14);font-size:14px;color:var(--muted);text-align:left}
    .choices{display:grid;gap:13px;margin-top:24px}
    .choice{width:100%;text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.68);border-radius:27px;padding:20px;transition:.18s}
    .choice:hover{transform:translateY(-1px);background:white}
    .choice.selected{background:var(--deep);color:white;border-color:var(--deep)}
    .choice strong{display:block;font-size:18px}
    .choice span{display:block;margin-top:5px;color:var(--muted);font-size:14px;line-height:1.4}
    .choice.selected span{color:rgba(255,255,255,.7)}
    .topics{grid-template-columns:repeat(4,1fr)}
    .topic-icon{font-size:30px;margin-bottom:14px}
    .mission{background:var(--deep);color:white;border-radius:29px;padding:24px;display:grid;grid-template-columns:70px 1fr;gap:18px;align-items:center}
    .mission p{color:rgba(255,255,255,.74);margin:8px 0 0}
    .mini-nova{width:72px;height:78px;border-radius:32px 32px 28px 28px;background:linear-gradient(150deg,#ffefc7,#ffd989 55%,#f7b86e);position:relative;box-shadow:0 16px 34px rgba(23,19,15,.16)}
    .mini-nova:before,.mini-nova:after{content:"";position:absolute;top:30px;width:8px;height:11px;background:#17130f;border-radius:999px}
    .mini-nova:before{left:24px}.mini-nova:after{right:24px}
    .mini-nova .mini-smile{position:absolute;left:50%;top:44px;transform:translateX(-50%);width:26px;height:12px;border-bottom:3px solid #17130f;border-radius:0 0 999px 999px}
    .tip{margin-top:16px;background:#fff3cf;border:1px solid rgba(150,104,15,.12);border-radius:24px;padding:16px;color:#5b4524;display:flex;gap:12px;align-items:flex-start}
    .toast{position:fixed;top:22px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:99;background:#17130f;color:white;border-radius:999px;padding:12px 18px;box-shadow:0 20px 60px rgba(23,19,15,.24);opacity:0;pointer-events:none;transition:.25s}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .video{margin-top:22px;overflow:hidden;border-radius:31px;background:#17130f;color:white;box-shadow:0 24px 60px rgba(23,19,15,.24)}
    .video-stage{min-height:330px;padding:24px;display:flex;flex-direction:column;justify-content:space-between;background:radial-gradient(circle at 35% 0%,rgba(255,217,137,.22),transparent 32%),linear-gradient(135deg,rgba(255,255,255,.09),transparent)}
    .scene-title{font-size:22px;font-weight:820;letter-spacing:-.4px}
    .scene-sub{font-size:13px;color:rgba(255,255,255,.62);margin-top:5px}
    .characters{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
    .person{border-radius:28px;background:rgba(255,255,255,.1);padding:18px;position:relative;min-height:130px;transition:.2s}
    .person.active{background:rgba(255,255,255,.18);outline:1px solid rgba(255,255,255,.22)}
    .avatar{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.18);font-size:30px;margin-bottom:12px}
    .wave{height:38px;display:flex;gap:4px;align-items:end;margin-top:14px}
    .wave span{width:6px;height:8px;border-radius:99px;background:#ffd989;opacity:.35}
    .active .wave span{animation:bounce .75s ease-in-out infinite;opacity:1}
    .active .wave span:nth-child(2){animation-delay:.1s}.active .wave span:nth-child(3){animation-delay:.2s}.active .wave span:nth-child(4){animation-delay:.3s}.active .wave span:nth-child(5){animation-delay:.4s}
    @keyframes bounce{50%{height:30px}}
    .video-controls{padding:16px;border-top:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
    .listen-progress{height:8px;flex:1;min-width:180px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden}
    .listen-progress div{height:100%;width:0%;background:#ffd989;transition:width .2s}
    .transcript{display:none;margin-top:16px;background:rgba(255,255,255,.68);border-radius:24px;padding:18px;max-height:280px;overflow:auto}
    .transcript.open{display:block}
    .transcript p{margin:7px 0;color:#50483f}
    .activity{margin-top:18px;background:rgba(255,255,255,.68);border:1px solid var(--line);border-radius:28px;padding:20px}
    .q{border-top:1px solid var(--line);padding-top:16px;margin-top:16px}
    .q:first-of-type{border-top:0;padding-top:0}
    .option{width:100%;text-align:left;margin-top:9px;border:1px solid var(--line);background:white;border-radius:17px;padding:12px 14px;transition:.16s}
    .option:hover{background:#f8f4ed}
    .option.selected{border-color:var(--deep);background:#ede5da}
    .option.correct{border-color:rgba(31,143,86,.5);background:#e5f7ed}
    .option.wrong{border-color:rgba(200,55,55,.5);background:#fde8e8}
    .explain{margin-top:10px;background:#fff7e5;border-radius:16px;padding:12px;font-size:14px;color:#604b2b}
    .score{font-weight:850;color:var(--green);margin-top:12px}
    .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .match-col{display:grid;gap:10px}
    .match-item{border:1px solid var(--line);background:white;border-radius:17px;padding:13px;text-align:left;min-height:54px;transition:.16s}
    .match-item.selected{background:#17130f;color:white}
    .match-item.done{background:#e5f7ed;border-color:rgba(31,143,86,.45);color:#123622}
    .match-item.bad{animation:shake .25s ease;background:#fde8e8}
    @keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .phrase-list{display:grid;gap:10px;margin-top:12px}
    .phrase{background:white;border-radius:18px;padding:13px;border:1px solid var(--line)}
    .conversation{display:grid;grid-template-columns:290px 1fr;gap:18px;align-items:stretch}
    .partner-card{border-radius:30px;background:#17130f;color:white;padding:22px;position:relative;overflow:hidden}
    .partner-card p{color:rgba(255,255,255,.72)}
    .chat{height:430px;overflow:auto;background:rgba(255,255,255,.67);border:1px solid var(--line);border-radius:30px;padding:16px;display:flex;flex-direction:column;gap:10px}
    .bubble{max-width:84%;padding:13px 15px;border-radius:20px;background:#17130f;color:white;line-height:1.45}
    .bubble.user{align-self:flex-end;background:#e8dfd3;color:#17130f}
    .bubble.system{align-self:center;background:#fff3cf;color:#5b4524;font-size:13px}
    .mic-panel{margin-top:14px;background:rgba(255,255,255,.67);border:1px solid var(--line);border-radius:26px;padding:16px;text-align:center}
    .mic{height:72px;width:72px;border-radius:50%;display:grid;place-items:center;margin:0 auto 10px;background:#17130f;color:white;font-size:30px;box-shadow:0 18px 42px rgba(23,19,15,.25)}
    .mic.listening{animation:ring 1.15s infinite;background:#af2f3a}
    @keyframes ring{0%{box-shadow:0 0 0 0 rgba(175,47,58,.35)}70%{box-shadow:0 0 0 18px rgba(175,47,58,0)}100%{box-shadow:0 0 0 0 rgba(175,47,58,0)}}
    .notice{font-size:13px;color:var(--muted)}
    .transcript-note{margin-top:10px;background:#fff3cf;border-radius:16px;padding:10px 12px;font-size:13px;color:#604b2b}
    .transcript-error{margin-top:10px;background:#fde8e8;border-radius:16px;padding:10px 12px;font-size:13px;color:#7a2525}
    .mic-status{margin-top:10px;background:#e9f7ef;border-radius:16px;padding:10px 12px;font-size:13px;color:#17663d;font-weight:700}
    .mic-hint{margin-top:10px;background:#eef6ff;border-radius:16px;padding:10px 12px;font-size:13px;color:#2d4d6b}
    .pending-answer{margin-top:12px;background:#fff;border:1px solid rgba(23,19,15,.12);border-radius:18px;padding:12px;text-align:left}.pending-answer b{display:block;margin-bottom:6px}.pending-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}.conversation-end{margin-top:12px;background:#e9f7ef;border-radius:18px;padding:12px;color:#17663d;font-weight:700}
    .level-focus{margin-top:14px;display:grid;gap:8px;background:#f7efe3;border:1px solid rgba(23,19,15,.08);border-radius:22px;padding:14px;color:#51483f}
    .level-focus b{color:#17130f}
    .skill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.skill-tag{background:white;border:1px solid rgba(23,19,15,.1);border-radius:999px;padding:7px 10px;font-size:12px;color:#5b5148}
    .live-transcript{margin-top:12px;border:1px dashed rgba(23,19,15,.2);background:#fffaf0;border-radius:20px;padding:12px;text-align:left}
    .live-transcript b{display:block;margin-bottom:4px}.live-transcript span{color:#604b2b}
    .feedback-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:20px}
    .feedback-item{background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:25px;padding:18px}
    .feedback-list{margin:8px 0 0 0;padding-left:20px}.feedback-list li{margin:7px 0;line-height:1.45}.quote-chip{display:inline-block;background:#fff6df;border:1px solid rgba(23,19,15,.1);border-radius:999px;padding:5px 9px;margin:3px;font-size:12px}
    .checklist{display:grid;gap:10px;margin-top:18px}
    .check{background:white;border:1px solid var(--line);border-radius:18px;padding:13px;display:flex;gap:10px;align-items:center}
    .final-card{background:linear-gradient(135deg,rgba(255,255,255,.78),rgba(255,245,220,.78));}
    .saved{background:#1f8f56!important}


    /* LingQuest v6 character: Nova is a small cosmic companion, not an owl */
    .mini-nova{width:72px;height:78px;border-radius:42% 42% 38% 38%/46% 46% 44% 44%!important;background:linear-gradient(145deg,#9c7cff,#7f5cff 48%,#ffb36b)!important;position:relative;box-shadow:0 16px 34px rgba(23,19,15,.16)!important}
    .mini-nova:before{content:"";position:absolute!important;left:50%!important;top:-24px!important;width:5px!important;height:32px!important;background:#7f5cff!important;border-radius:99px!important;transform:translateX(-50%)!important}
    .mini-nova:after{content:"";position:absolute!important;left:50%!important;top:-33px!important;width:22px!important;height:22px!important;background:#ffd166!important;border-radius:50%!important;transform:translateX(-50%)!important;box-shadow:0 0 16px rgba(255,209,102,.7)!important}
    .mini-nova .mini-eye{position:absolute;top:25px;width:23px;height:27px;background:white;border-radius:50%;z-index:4}
    .mini-nova .mini-eye.left{left:12px}.mini-nova .mini-eye.right{right:12px}
    .mini-nova .mini-eye.left:after,.mini-nova .mini-eye.right:after{content:"";position:absolute;left:8px;top:9px;width:8px;height:10px;border-radius:99px;background:#17130f}
    .mini-nova .mini-beak{display:none!important}
    .mini-nova .mini-mouth{position:absolute;left:50%;top:48px;transform:translateX(-50%);width:28px;height:13px;border-bottom:3px solid #17130f;border-radius:0 0 999px 999px;z-index:5}
    .mini-nova .mini-cheek{position:absolute;top:49px;width:18px;height:9px;border-radius:99px;background:rgba(255,126,139,.55);z-index:5}
    .mini-nova .mini-cheek.left{left:12px}.mini-nova .mini-cheek.right{right:12px}

    .insight-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .insight-pill{border-radius:22px;padding:16px 18px;border:1px solid rgba(23,19,15,.1);box-shadow:0 10px 28px rgba(60,45,25,.08)}
    .insight-pill b{display:block;font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;color:rgba(23,19,15,.7)}
    .insight-pill p{margin:0;color:#342b24;font-weight:700;line-height:1.35}
    .insight-pill.good{background:#e9f7ef}.insight-pill.warn{background:#fff3cf}.insight-pill.blue{background:#eef6ff}.insight-pill.rose{background:#fde8e8}
    .feedback-section{margin-top:18px;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:28px;padding:20px}
    .feedback-section h3{display:flex;gap:8px;align-items:center}
    .mini-score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}

        Advanced:{tip:"Phrase tip: Advanced directions use indirect questions: “Would you happen to know whether...?”", dialogue:[["Traveler","Excuse me, would you happen to know the quickest way to get to Grand Central from here?"],["Local","Yes. If you are in a hurry, the subway is probably your best option."],["Traveler","That makes sense. Is the nearest entrance on this side of the avenue?"],["Local","It is actually across the street, just past the newsstand."],["Traveler","Got it. Do I need to change lines, or is it direct?"],["Local","It is direct. Take the downtown train for two stops, then follow the signs for the main concourse."],["Traveler","Perfect. Would the platform be clearly marked?"],["Local","Yes, but keep an eye out because there are express trains that skip your stop."],["Traveler","Good to know. So I should take the local train, not the express."],["Local","Exactly. The local train will get you there in about eight minutes."]], quiz:[{q:"What is the quickest option?",options:["Walking","Subway","Taxi","Bus"],answer:1,why:"The local says the subway is probably the best option."},{q:"Where is the nearest entrance?",options:["Across the street past the newsstand","Inside the hotel","Next to the library","Behind the station"],answer:0,why:"The local says it is across the street, just past the newsstand."},{q:"Does the traveler need to change lines?",options:["Yes","No, it is direct","Only at night","The local is unsure"],answer:1,why:"The local says it is direct."},{q:"Why should the traveler avoid express trains?",options:["They cost more","They skip the stop","They are slower","They are closed"],answer:1,why:"The local warns that express trains skip the stop."}], matching:[["Would you happen to know...?","A very polite indirect question"],["in a hurry","needing to go quickly"],["direct","without changing lines"],["main concourse","the large central area of a station"],["keep an eye out","watch carefully"]], blanks:[{s:"Would you happen ___ know th         Intermediate:{tip:"Phrase tip: “How are you finding...?” means “What do you think of it so far?”", dialogue:[["Colleague","Hi, I don’t think we’ve met. You must be new here."],["New employee","Yes, I started this morning. I’m Alex."],["Colleague","Nice to meet you, Alex. I’m Emma from product."],["New employee","Nice to meet you too. I’m still finding my way around."],["Colleague","That is normal. How are you finding the office so far?"],["New employee","It’s been good. Everyone has been welcoming, but the meeting room names are confusing."],["Colleague","They are all named after cities. Berlin is near the windows, and Tokyo is by the elevators."],["New employee","That helps a lot. Do people usually eat lunch together?"],["Colleague","Some of us go out around one. You’re welcome to join us."],["New employee","Thanks, I’d like that."]], quiz:[{q:"When did Alex start?",options:["Yesterday","This morning","Last week","Next Monday"],answer:1,why:"Alex says they started this morning."},{q:"What is confusing?",options:["The coffee machine","The meeting room names","The email system","The schedule"],answer:1,why:"Alex says the room names are confusing."},{q:"What are the rooms named after?",options:["Colors","Cities","Animals","Numbers"],answer:1,why:"Emma says they are named after cities."},{q:"What invitation does Emma make?",options:["Join lunch","Attend training","Leave early","Meet the CEO"],answer:0,why:"Emma says Alex is welcome to join lunch."}], matching:[["I don’t think we’ve met","A natural first meeting phrase"],["finding my way around","learning where things are"],["How are you finding...?","What do you think of...? so far"],["welcoming","friendly and kind"],["You’re welcome to join us","A friendly invitation"]], blanks:[{s:"I don’t think we’ve ___.",options:["met","meet","meeting","meets"],answer:0,why:"Use past participle “met” with present perfect."},{s:"I’m still finding my way ___.",options:["around","over","through","between"],answer:0,why:"The p         Advanced:{tip:"Phrase tip: Advanced small talk uses soft comments like “I’m still getting settled.”", dialogue:[["Colleague","Hey, I don’t think we’ve had a chance to meet properly. I’m Emma from product strategy."],["New employee","Nice to meet you, Emma. I’m Alex. I just joined the growth team, so I’m still getting settled."],["Colleague","Welcome aboard. First weeks can be a lot, especially with all the internal names and rituals."],["New employee","Definitely. I’m trying to figure out which meetings are essential and which ones are more optional."],["Colleague","That is a smart question. The Monday planning meeting is important, but the Friday demo is more informal."],["New employee","Good to know. I noticed people tend to discuss blockers pretty openly here."],["Colleague","Yes, that is part of the culture. It is better to flag issues early than hide them until later."],["New employee","I appreciate that. It makes the team feel more transparent."],["Colleague","Exactly. By the way, a few of us are grabbing lunch downstairs if you want to join."],["New employee","I’d love to. It would be nice to hear how people actually work day to day."]], quiz:[{q:"What team did Alex join?",options:["Product strategy","Growth","Finance","Operations"],answer:1,why:"Alex says they joined the growth team."},{q:"What is Alex trying to understand?",options:["Which meetings matter most","Where the kitchen is","How to book vacation","Who manages payroll"],answer:0,why:"Alex asks which meetings are essential vs optional."},{q:"What does Emma say about blockers?",options:["Hide them","Discuss them early","Send them only by email","Never mention them"],answer:1,why:"Emma says it is better to flag issues early."},{q:"What does “getting settled” mean?",options:["Becoming comfortable in a new place","Going home","Scheduling a meeting","Making a payment"],answer:0,why:"“Getting settled” means adjusting and becoming comfortable."}], matching:[["meet properly","have a real introductio         const merged = Object.assign({}, s, {appVersion:APP_STATS_VERSION, statsNamespace:STATS_NAMESPACE}, patchWithMeta);

          id,
          appVersion:APP_STATS_VERSION,
          statsNamespace:STATS_NAMESPACE,
          startedAt:now,
          events:[localEvent]
        }, patchWithMeta);

    function bestVoice(preferFemale=true){
      if(!voices.length) loadVoices();
      const prefix = speechPrefix();
      const target = voices.filter(v => (v.lang||"").toLowerCase().startsWith(prefix));
      const usable = target.length ? target : voices.filter(v => (v.lang||"").toLowerCase().startsWith("en"));
      if(!usable.length) return voices[0] || null;

      const femaleHints = ["samantha","victoria","karen","moira","tessa","veena","serena","susan","zira","aria","sonia","amelie","audrey","anna","katja","helena","female","google","microsoft"];
      const maleHints = ["daniel","alex","fred","tom","guy","david","mark","george","oliver","thomas","stefan","male","google","microsoft"];
      const naturalHints = ["neural","natural","premium","enhanced","google","microsoft"];

      function score(v){
        const n = v.name.toLowerCase();
        let s = 0;
        if((v.lang||"").toLowerCase().startsWith(prefix)) s += 80;
        naturalHints.forEach((h,i)=>{ if(n.includes(h)) s += 20-i; });
        (preferFemale ? femaleHints : maleHints).forEach((h,i)=>{ if(n.includes(h)) s += 45-i; });
        (preferFemale ? maleHints : femaleHints).forEach(h=>{ if(n.includes(h)) s -= 10; });
        return s;
      }
      return usable.slice().sort((a,b)=>score(b)-score(a))[0] || usable[0];
    }

    function voiceNamePriority(v, language, preferFemale=true){
      const name = (v.name || "").toLowerCase();
      const lang = (v.lang || "").toLowerCase();
      let score = 0;

      // Quality markers. Browser support varies, but these usually indicate the least robotic voices.
      if(/online \(natural\)|online natural|natural online/.test(name)) score += 120;
      if(/neural|natural|wavenet|studio|premium|enhanced/.test(name)) score += 95;
      if(/google|microsoft|apple|siri/.test(name)) score += 55;
      if(/compact|classic|legacy|espeak|festival/.test(name)) score -= 70;

      // German-specific tuning: avoid harsh legacy voices; prefer clear modern DE voices.
      if(language==="German"){
        if(/deutschland|germany|de-de/.test(name)) score += 12;
        if(/florian|killian|conrad|amala|katja|louisa|seraphina/.test(name)) score += 45;
        if(/anna|helena|marlene|stefan|klaus/.test(name)) score += 18;
        if(/classic|compact|old|legacy|robot|standard/.test(name)) score -= 55;
      }

      const exact = language==="French" ? "fr-fr" : language==="German" ? "de-de" : "en-us";
      const prefix = language==="French" ? "fr" : language==="German" ? "de" : "en";
      if(lang === exact) score += 110;
      else if(lang.startsWith(prefix)) score += 80;

      const preferred = {
        English: {
          female:/ava|emma|jenny|aria|sara|samantha|victoria|serena|sonia|zira|moira|tessa|karen|female|woman/i,
          male:/andrew|brian|guy|roger|ryan|davis|jason|tony|daniel|alex|fred|oliver|george|david|male|man/i
        },
        French: {
          female:/denise|eloise|éloise|vivienne|celeste|céleste|coralie|brigitte|audrey|amelie|amélie|hortense|aurelie|aurélie|marie|lucie|léa|lea|julie|female|woman/i,
          male:/henri|remy|rémy|claude|maurice|yves|thomas|paul|pierre|nicolas|antoine|male|man/i
        },
        German: {
          female:/katja|amala|louisa|seraphina|maja|tanja|klarissa|gisela|elke|anna|helena|marlene|hedda|petra|female|woman/i,
          male:/florian|killian|conrad|finn|bernd|christoph|klaus|ralf|stefan|hans|markus|male|man/i
        }
      };

      const hints = preferred[language] || preferred.English;
      if(preferFemale && hints.female.test(v.name)) score += 55;
      if(!preferFemale && hints.male.test(v.name)) score += 55;
      if(preferFemale && hints.male.test(v.name)) score -= 10;
      if(!preferFemale && hints.female.test(v.name)) score -= 10;

      // Very short/system voices are often flatter.
      if(name.length < 5) score -= 10;
      if(v.default) score += 4;
      return score;
    }

    function bestLanguageVoice(language, preferFemale=true, avoidName=""){
      if(!voices.length) loadVoices();
      const prefix = language==="French" ? "fr" : language==="German" ? "de" : "en";
      const exact = language==="French" ? "fr-fr" : language==="German" ? "de-de" : "en-us";

      let pool = voices.filter(v => (v.lang||"").toLowerCase() === exact);
      if(!pool.length) pool = voices.filter(v => (v.lang||"").toLowerCase().startsWith(prefix));
      if(!pool.length) pool = voices.filter(v => (v.lang||"").toLowerCase().startsWith("en"));
      if(!pool.length) pool = voices.slice();

      const sorted = pool.slice().sort((a,b)=>voiceNamePriority(b, language, preferFemale)-voiceNamePriority(a, language, preferFemale));
      const different = sorted.find(v => !avoidName || v.name !== avoidName);
      return different || sorted[0] || voices[0] || null;
    }

    function voicePair(){
      if(!voices.length) loadVoices();
      const language = targetLanguage();
      const prefix = language==="French" ? "fr" : language==="German" ? "de" : "en";
      const exact = language==="French" ? "fr-fr" : language==="German" ? "de-de" : "en-us";

      const languageVoices = voices.filter(v => {
        const lang = (v.lang||"").toLowerCase();
        return lang === exact || lang.startsWith(prefix);
      });

      const qualityMarker = v => /online \(natural\)|online natural|natural online|neural|natural|wavenet|studio|premium|enhanced|google|microsoft|apple|siri/i.test(v?.name || "");
      const badMarker = v => /compact|classic|legacy|espeak|festival|robot|standard/i.test(v?.name || "");

      const rank = (preferFemale) => languageVoices
        .filter(v => !badMarker(v))
        .sort((a,b) => {
          const aScore = (qualityMarker(a)?140:0) + voiceNamePriority(a, language, preferFemale);
          const bScore = (qualityMarker(b)?140:0) + voiceNamePriority(b, language, preferFemale);
          return bScore - aScore;
        });

      let female = bestLanguageVoice(language, true);
      let male = bestLanguageVoice(language, false, female?.name || "");

      if(language==="German"){
        const femaleRanked = rank(true);
        const brightFemaleName = /katja|amala|seraphina|maja|tanja|anna|helena|female|woman/i;
        const warmFemaleName = /louisa|klarissa|gisela|elke|marlene|hedda|petra|female|woman/i;

        // German distinct female listening mode:
        // Both speakers use clear female-style voices. Speaker A is slightly brighter;
        // Speaker B is slightly warmer when a second clean voice is available.
        const harshOrBreathy = v => /hans|klaus|stefan|ralf|markus|bernd|christoph|conrad|standard|classic|compact|legacy|male|man/i.test(v?.name || "");
        const clearGermanVoices = languageVoices
          .filter(v => v && !badMarker(v) && !harshOrBreathy(v));

        const brightRanked = clearGermanVoices.slice().sort((a,b)=>{
          const aq = (qualityMarker(a)?280:0) + voiceNamePriority(a, language, true) + (brightFemaleName.test(a.name)?95:0);
          const bq = (qualityMarker(b)?280:0) + voiceNamePriority(b, language, true) + (brightFemaleName.test(b.name)?95:0);
          return bq - aq;
        });

        const warmRanked = clearGermanVoices.slice().sort((a,b)=>{
          const aq = (qualityMarker(a)?280:0) + voiceNamePriority(a, language, true) + (warmFemaleName.test(a.name)?100:0) - (brightFemaleName.test(a.name)?25:0);
          const bq = (qualityMarker(b)?280:0) + voiceNamePriority(b, language, true) + (warmFemaleName.test(b.name)?100:0) - (brightFemaleName.test(b.name)?25:0);
          return bq - aq;
        });

        const firstFemale = brightRanked[0] || femaleRanked[0] || clearGermanVoices[0] || female || languageVoices[0] || male;
        const secondFemale = warmRanked.find(v => firstFemale && v.name !== firstFemale.name) ||
                             clearGermanVoices.find(v => firstFemale && v.name !== firstFemale.name) ||
                             firstFemale;

        female = firstFemale;
        male = secondFemale; // second speaker slot; intentionally clear female-style for German

        return {female, male};
      }

      // Non-German languages keep the already-good v28 tuning.
      const sameLanguageVoices = languageVoices;
      const femaleScore = female ? voiceNamePriority(female, language, true) : 0;
      const maleScore = male ? voiceNamePriority(male, language, false) : -999;

      const bestPleasantAlternative = sameLanguageVoices
        .filter(v => !badMarker(v))
        .sort((a,b) => {
          const aq = (qualityMarker(a)?120:0) + voiceNamePriority(a, language, false);
          const bq = (qualityMarker(b)?120:0) + voiceNamePriority(b, language, false);
          return bq - aq;
        })[0] || female || male;

      const maleLooksBad = !male || badMarker(male) || (female && maleScore < femaleScore - 55) || (!qualityMarker(male) && qualityMarker(female));
      if(maleLooksBad && bestPleasantAlternative){
        male = bestPleasantAlternative;
      }

      return {female, male};
    }

    function normalizeSpeechText(text){
      let s = String(text || "")
        .replace(/[’‘]/g, "'")
        .replace(/[“”]/g, '"')
        .replace(/\s+/g, " ")
        .trim();

      if(targetLanguage()==="French"){
        s = s
          .replace(/20h15/g, "vingt heures quinze")
          .replace(/19h30/g, "dix-neuf heures trente")
          .replace(/18h30/g, "dix-huit heures trente")
          .replace(/15h30/g, "quinze heures trente")
          .replace(/11h/g, "onze heures")
          .replace(/14h/g, "quatorze heures")
          .replace(/555\s*0198/g, "cinq cinq cinq, zéro un quatre-vingt-dix-huit")
          .replace(/Q&A/g, "questions-réponses")
          .replace(/\s+([?.!,;:])/g, "$1");
      }

      if(targetLanguage()==="German"){
        s = s
          .replace(/15:30/g, "fünfzehn Uhr dreißig")
          .replace(/19:30/g, "neunzehn Uhr dreißig")
          .replace(/20:15/g, "zwanzig Uhr fünfzehn")
          .replace(/19h30/g, "neunzehn Uhr dreißig")
          .replace(/20h15/g, "zwanzig Uhr fünfzehn")
          .replace(/11 Uhr/g, "elf Uhr")
          .replace(/\bQ&A\b/g, "Fragen und Antworten")
          .replace(/\s+([?.!,;:])/g, "$1");
      }

      if(targetLanguage()==="English"){
        s = s.replace(/\s+([?.!,;:])/g, "$1");
      }
      return s;
    }

    function speechChunksFor(text){
      const s = normalizeSpeechText(text);

      // Keep dialogue lines mostly intact. Over-chunking sounds robotic.
      const limit = targetLanguage()==="German" ? 165 : targetLanguage()==="French" ? 155 : 170;
      if(s.length <= limit) return [s];

      const boundary = targetLanguage()==="French"
        ? /(?<=[.!?])\s+|(?<=;)\s+|(?<=,)\s+(?=(mais|donc|alors|parce|car|et|ou)\b)/i
        : targetLanguage()==="German"
          ? /(?<=[.!?])\s+|(?<=;)\s+|(?<=,)\s+(?=(aber|denn|deshalb|wenn|und|oder)\b)/i
          : /(?<=[.!?])\s+|(?<=;)\s+|(?<=,)\s+(?=(because|but|so|and|or|if|when)\b)/i;

      const parts = s.split(boundary).map(x=>x.trim()).filter(Boolean);
      const chunks = [];
      parts.forEach(part=>{
        if(part.length <= limit){ chunks.push(part); return; }
        const words = part.split(" ");
        let buf = "";
        words.forEach(w=>{
          if((buf+" "+w).trim().length > limit-22){
            if(buf) chunks.push(buf.trim());
            buf = w;
          }else{
            buf += " " + w;
          }
        });
        if(buf) chunks.push(buf.trim());
      });
      return chunks.length ? chunks : [s];
    }

    function languageRate(baseRate){
      // Final tuning: clear, warm, slightly below real-life speed.
      if(targetLanguage()==="French"){
        if(state.level==="Beginner") return .84;
        if(state.level==="Intermediate") return .90;
        return .96;
      }
      if(targetLanguage()==="German"){
        if(state.level==="Beginner") return .86;
        if(state.level==="Intermediate") return .91;
        return .96;
      }
      if(state.level==="Beginner") return .84;
      if(state.level==="Intermediate") return .94;
      return 1.00;
    }

    function speakerProsody(female=true, text=""){
      const L = targetLanguage();
      const isQuestion = /\?\s*$/.test(String(text || ""));
      const hasEmotion = /!\s*$/.test(String(text || ""));
      let p, r;

      // Final male tuning: avoid very low pitch because browser TTS often turns it
      // into a rough/robotic voice. A slightly higher male pitch sounds warmer and clearer.
      if(L==="French"){
        p = female ? 1.025 : .975;
        r = female ? 1.00 : .995;
      }else if(L==="German"){
        // German natural female pair:
        // Speaker A is slightly brighter; Speaker B is a little warmer and calmer.
        // The difference is subtle enough to keep both voices natural, human-like, and clear.
        p = female ? 1.035 : .985;
        r = female ? 1.005 : .985;
      }else{
        p = female ? 1.045 : .955;
        r = female ? 1.00 : .998;
      }

      if(isQuestion) p += .014;
      if(hasEmotion) r += .012;
      return {pitch:p, rateAdjust:r};
    }

    function speakOneUtterance(text, opts={}, onend){
      const u = new SpeechSynthesisUtterance(text);
      const pair = voicePair();
      const v = opts.voice || (opts.female === false ? pair.male : pair.female) || pair.female || pair.male || null;
      const prosody = speakerProsody(opts.female !== false, text);

      u.lang = v && v.lang ? v.lang : speechLang();
      const baseRate = opts.rate || levelInfo[state.level]?.rate || .9;

      const voiceName = (v?.name || "").toLowerCase();
      const isNaturalVoice = /neural|natural|online|premium|enhanced|google|microsoft|siri|apple/.test(voiceName);
      const naturalBoost = targetLanguage()==="German" ? (isNaturalVoice ? 1.0 : .975) : (isNaturalVoice ? 1.015 : .985);

      let computedRate = languageRate(baseRate) * (opts.rateAdjust || prosody.rateAdjust || 1) * naturalBoost;
      if(targetLanguage()==="German" && opts.female === false){
        // Speaker B is calmer, but not slowed enough to sound robotic.
        computedRate *= .985;
      }
      if(targetLanguage()==="German" && opts.female !== false){
        // Speaker A is only slightly brighter and more energetic.
        computedRate *= 1.005;
      }
      u.rate = Math.max(.68, Math.min(1.08, computedRate));
      const rawPitch = opts.pitch || prosody.pitch || 1;
      u.pitch = targetLanguage()==="German"
        ? Math.max(.965, Math.min(1.075, rawPitch))
        : Math.max(.96, Math.min(1.13, rawPitch));
      u.volume = 1;
      if(v) u.voice = v;

      let finished = false;
      let watchdog = null;
      const finish = () => {
        if(finished) return;
        finished = true;
        if(watchdog) clearTimeout(watchdog);
        currentUtterance = null;
        if(onend) onend();
      };

      u.onend = finish;
      u.onerror = () => {
        currentUtterance=null;
        if(v && !opts._retried){
          try{
            speakOneUtterance(text, Object.assign({}, opts, {voice:null, _retried:true}), onend);
            return;
          }catch(e){}
        }
        finish();
      };

      currentUtterance = u;
      watchdog = setTimeout(finish, Math.max(3200, Math.min(24000, String(text).length * 160)));
      try{ speechSynthesis.speak(u); }catch(e){ finish(); }
    }

    function speakText(text, opts={}, onend){
      if(!("speechSynthesis" in window)){ if(onend) onend(); return; }
      if(!opts.noCancel) speechSynthesis.cancel();
      if(!voices.length) loadVoices();

      const chunks = speechChunksFor(text);
      let i = 0;

      function speakNext(){
        if(i >= chunks.length){ if(onend) onend(); return; }
        const chunk = chunks[i++];
        speakOneUtterance(chunk, opts, () => {
          const pause = chunk.length < 45 ? 95 : chunk.length < 95 ? 135 : 165;
          setTimeout(speakNext, pause);
        });
      }

      setTimeout(()=>{
        try{ speakNext(); }
        catch(e){ if(onend) onend(); }
      }, 65);
    }
    function stopAllAudio(){
      if("speechSynthesis" in window) speechSynthesis.cancel();
      if(recognition && state.recognizing){ try{recognition.stop()}catch(e){} }
      if(mediaRecorder && mediaRecorder.state === "recording"){ try{mediaRecorder.stop()}catch(e){} }
      clearTimeout(recordingTimer);
      patchStateNoRender({playing:false, recognizing:false});
    }


    function releaseMic(){
      if(mediaStream){ mediaStream.getTracks().forEach(track=>track.stop()); mediaStream=null; }
      patchStateNoRender({micAllowed:false, recognizing:false});
    }


    function startListeningAudio(){
      const t=topic();
      stopAllAudio();
      loadVoices();
      patchStateNoRender({playing:true, listeningStarted:true, listenIndex:0, listenProgress:0, activeSpeaker:0});
      updateSession({
        listeningStarted:true,
        listeningComplete:false,
        listenIndex:0,
        listenProgress:0,
        targetLanguage:targetLanguage(),
        level:state.level,
        topic:state.topicId,
        topicTitle:t.title
      }, "listening_started");
      render();

      // Some browsers load non-English voices slightly late. Give French voices
      // one short moment to appear before the first line starts.
      if(targetLanguage()==="French"){
        setTimeout(()=>{ loadVoices(); playLine(0); }, 450);
      }else{
        playLine(0);
      }
    }
    function playLine(i){
      const t=topic();
      if(i >= t.dialogue.length){
        patchStateNoRender({playing:false, listeningComplete:true, listenIndex:t.dialogue.length, listenProgress:100});
        updateSession({listeningComplete:true}, "listening_complete");
        render();
        showToast(targetLanguage()==="German" ? "Listening abgeschlossen. Jetzt kommen die Übungen." : targetLanguage()==="French" ? "Écoute terminée. Maintenant, passons aux activités." : "Listening complete. Now you are ready for the activities.");
        return;
      }
      const speakerName = t.dialogue[i][0];
      const speakerIndex = Array.isArray(t.roles) ? t.roles.indexOf(speakerName) : -1;
      const voiceIndex = speakerIndex >= 0 ? speakerIndex : i%2;
      const currentProgress = Math.round((i/t.dialogue.length)*100);
      patchStateNoRender({activeSpeaker: voiceIndex, listenIndex:i, listenProgress: currentProgress, playing:true});
      updateSession({
        listeningStarted:true,
        listenIndex:i,
        listenProgress:currentProgress,
        activeSpeaker:voiceIndex,
        targetLanguage:targetLanguage(),
        level:state.level,
        topic:state.topicId,
        topicTitle:t.title
      }, "listening_progress");
      render();
      const line = t.dialogue[i][1];
      const pair = voicePair();
      const firstVoice = voiceIndex === 0;
      speakText(line, {
        noCancel:false,
        voice:firstVoice?pair.female:pair.male,
        female:firstVoice,
        rate:levelInfo[state.level]?.rate||.9
      }, () => {
        const nextSpeaker = i+1 < t.dialogue.length ? t.dialogue[i+1][0] : "";
        const baseSpeakerPause = targetLanguage()==="German" ? 430 : 430;
        const baseSameSpeakerPause = targetLanguage()==="German" ? 250 : 260;
        const speakerChangePause = nextSpeaker && nextSpeaker !== speakerName ? baseSpeakerPause : baseSameSpeakerPause;
        const punctuationPause = /[!?]$/.test(line.trim()) ? 90 : 0;
        setTimeout(()=>playLine(i+1), speakerChangePause + punctuationPause);
      });
    }
    function pauseListening(){
      stopAllAudio();
      setState({playing:false});
    }
    function replayListening(){
      patchStateNoRender({listeningComplete:false});
      startListeningAudio();
    }


    function getResultSummary(){

      t.quiz.forEach((q,i)=>{ if(Number(state.quizAnswers[i])===q.answer) quizCorrect++; });
      let blankCorrect=0;
      t.blanks.forEach((b,i)=>{ if(Number(state.blanks[i])===b.answer) blankCorrect++; });
      const matchCorrect = Object.keys(state.matches).length;
      return {quizCorrect, quizTotal:t.quiz.length, blankCorrect, blankTotal:t.blanks.length, matchCorrect, matchTotal:t.matching.length};
    }
    function activityTrackingSummary(){
      const s = getResultSummary();

      const correct = s.quizCorrect + s.blankCorrect + s.matchCorrect;
      return {
        quizCorrect:s.quizCorrect,
        quizTotal:s.quizTotal,
        grammarCorrect:s.blankCorrect,
        grammarTotal:s.blankTotal,
        matchingCorrect:s.matchCorrect,
        matchingTotal:s.matchTotal,
        totalCorrect:correct,

      };

    function shuffleOrder(n){
      const presets = {
        5:[2,4,0,3,1],
        6:[3,0,5,1,4,2],
        7:[4,1,6,2,0,5,3]
      };
      return presets[n] || Array.from({length:n},(_,i)=>i).sort((a,b)=>((a*7+3)%n)-((b*7+3)%n));
    }


    function optionOrder(n, seed=0, type="quiz"){
      if(n===4){
        const quizPresets = [
          [2,0,3,1],
          [1,3,0,2],
          [3,1,2,0],
          [2,3,1,0]
        ];
        const blankPresets = [
          [1,0,3,2],
          [3,1,0,2],
          [2,3,0,1],
          [1,2,3,0]
        ];
        const bank = type==="blank" ? blankPresets : quizPresets;
        return bank[seed % bank.length];
      }
      return shuffleOrder(n);
    }


    async function requestMicPermissionOnceForDialogue(){
      state.micPermissionRequested = true;
      state.micError = "";
      state.transcriptError = "";
      render();


      if(mediaStream && mediaStream.active){
        state.micAllowed = true;
        state.micReady = true;
        startRecognitionOnceForDialogue();
        return true;
      }


      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        state.micAllowed = false;
        state.micReady = false;
        state.micError = "This browser cannot access the microphone here. Please use Chrome or Edge.";
        render();
        return false;
      }


      try{
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true }
        });


        state.micAllowed = true;
        state.micReady = true;
        state.micError = "";
        state.transcriptError = "";
        speechSegments = [];


        mediaStream.getAudioTracks().forEach(track => {
          track.onended = () => {
            state.micReady = false;
            state.micError = "Microphone stream ended. Please restart the dialogue page if you need to speak again.";
            render();
          };
        });


        // Permission + speech recognition start happen only here.
        startRecognitionOnceForDialogue();
        return true;
      }catch(e){
        state.micAllowed = false;
        state.micReady = false;
        state.micError = "Microphone permission was not granted. Please allow microphone access from the browser permission popup.";
        render();
        return false;
      }
    }


    function updateLiveTranscript(text){
      state.liveTranscript = text || "";
      const el = $("liveTranscriptText");
      if(el) el.textContent = state.liveTranscript || "Listening for your words...";
    }


    function setupRecognition(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR) return null;
      const r = new SR();
      r.lang = speechLang();
      r.interimResults = true;
      r.continuous = true;
      r.maxAlternatives = 3;


      r.onstart = () => {
        state.speechRecognitionReady = true;
      };


      r.onresult = (e) => {
        let finalText = "";
        let interimText = "";
        for(let i=e.resultIndex; i<e.results.length; i++){
          const part = e.results[i][0].transcript;
          if(e.results[i].isFinal) finalText += part + " ";
          else interimText += part + " ";
        }


        if(finalText.trim()){
          const clean = finalText.trim();
          speechSegments.push(clean);
          lastTranscript = clean;
          const combined = speechSegments.slice(state.captureStartIndex || 0).join(" ").trim() || clean;
          updateLiveTranscript(combined);
        } else if(interimText.trim()){
          const combined = (speechSegments.slice(state.captureStartIndex || 0).join(" ") + " " + interimText.trim()).trim();
          updateLiveTranscript(combined);
        }
      };


      r.onerror = (event) => {
        state.speechRecognitionReady = false;
        if(event && event.error && event.error !== "no-speech"){
          state.micError = `Speech recognition note: ${event.error}. Recording can still continue.`;
        }
      };


      r.onend = () => {
        state.speechRecognitionReady = false;
        if(keepRecognitionAlive && state.conversationStarted && state.micReady){
          setTimeout(() => {
            try { r.start(); } catch(e) {}
          }, 350);
        }
      };
      return r;
    }


    function startRecognitionOnceForDialogue(){
      if(!recognition) recognition = setupRecognition();
      if(!recognition) return;
      keepRecognitionAlive = true;
      try{
        recognition.start();
        state.speechRecognitionReady = true;
      }catch(e){
        // Already running is fine.
      }
    }


    async function requestMicPermission(){
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        showToast("Microphone access is not available here. Open LingQuest in Chrome or Edge.");
        return;
      }
      try{
        mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
        setState({micAllowed:true});
        showToast("Microphone access is ready. Tap the mic, speak, then tap again when you finish.");
      }catch(e){
        showToast("Microphone permission was not granted. Please allow microphone access in your browser settings.");
      }
    }


    function startMic(){
      if(state.conversationEnded){
        setState({pendingTranscript:"", transcriptError:"Conversation is complete. Continue to feedback."});
        return;
      }
      if(state.recognizing){
        stopRecordingAndProcess();
        return;
      }


      // No permission request here.
      // No SpeechRecognition.start() here.
      // Permission and recognition start only from Start the dialogue.
      if(!mediaStream || !mediaStream.active || !state.micReady){
        state.transcriptError = "Microphone is not ready. Please click Start the dialogue first.";
        render();
        return;
      }


      lastTranscript = "";
      state.pendingTranscript = "";
      updateLiveTranscript("");
      recordedChunks = [];
      state.captureStartIndex = speechSegments.length;


      try{
        mediaRecorder = new MediaRecorder(mediaStream);
        mediaRecorder.ondataavailable = (e) => { if(e.data && e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => processRecordedSpeech();
        mediaRecorder.start();


        state.recognizing = true;
        state.transcriptError = "";
        state.micError = "";
        render();


        clearTimeout(recordingTimer);
        // Recording stays open until the user taps the microphone again.
      }catch(e){
        state.transcriptError = "Recording could not start in this browser. Please use Chrome or Edge.";
        render();
      }
    }


    function stopRecordingAndProcess(){
      clearTimeout(recordingTimer);
      // Do not stop SpeechRecognition here; it stays alive for the dialogue.
      // Only stop MediaRecorder for this spoken turn.
      if(mediaRecorder && mediaRecorder.state === "recording"){
        try{ mediaRecorder.stop(); return; }catch(e){}
      }
      processRecordedSpeech();
    }


    async function processRecordedSpeech(){
      const capturedText = speechSegments.slice(state.captureStartIndex || 0).join(" ").trim();
      const heard = capturedText.length > 1 || (lastTranscript && lastTranscript.trim().length > 1);


      if(heard){
        const text = capturedText || lastTranscript.trim();
        lastTranscript = "";
        updateLiveTranscript(text);
        setState({recognizing:false, liveTranscript:text, pendingTranscript:text, transcriptError:""});
        return;
      }


      const transcript = await transcribeRecordedAudio();
      if(transcript){
        lastTranscript = "";
        updateLiveTranscript(transcript);
        setState({recognizing:false, liveTranscript:transcript, pendingTranscript:transcript, transcriptError:""});
        return;
      }


      lastTranscript = "";
      const msg = "I couldn’t catch your words clearly. Please record again and say one complete sentence.";
      updateLiveTranscript("");
      setState({recognizing:false, pendingTranscript:"", transcriptError:msg});
      showToast(msg);
      // Do not fake a transcript and do not advance the dialogue.
    }


    function blobToDataURL(blob){
      return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }


    async function transcribeRecordedAudio(){
      if(!remoteTranscribeAvailable || location.protocol === "file:" || !recordedChunks.length) return "";
      try{
        const mimeType = (mediaRecorder && mediaRecorder.mimeType) || "audio/webm";
        const blob = new Blob(recordedChunks, {type:mimeType});
        const dataUrl = await blobToDataURL(blob);
        const res = await fetch("/api/transcribe", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({audio:dataUrl, mimeType})
        });
        if(!res.ok){ remoteTranscribeAvailable = false; return ""; }
        const data = await res.json();
        return (data.text || "").trim();
      }catch(e){
        remoteTranscribeAvailable = false;
        return "";
      }
    }




    function cleanWords(text){
      return String(text || "").toLowerCase().replace(/[^\w\s'-]/g," ").replace(/\s+/g," ").trim();
    }
    function hasAny(text, words){ return words.some(w => text.includes(w)); }
    function extractName(text){
      const m = text.match(/(?:my name is|name is|under the name|i am|i'm)\s+([a-z]+(?:\s+[a-z]+)?)/i);
      return m ? m[1].replace(/\b\w/g, c => c.toUpperCase()) : "";
    }
    function replyByLevel(beginner, intermediate, advanced){
      if(state.level === "Beginner") return beginner;
      if(state.level === "Advanced") return advanced;
      return intermediate;
    }
    function rememberFromText(t, text){
      const mem = state.dialogMemory || {};
      const lower = cleanWords(text);
      const pick = arr => arr.find(w => lower.includes(w));
      const food = pick(["chicken","soup","salad","pasta","burger","pizza","fish","rice","steak"]);
      const side = pick(["potatoes","potato","fries","salad","rice","bread"]);
      const drink = pick(["water","tea","coffee","juice","cola","lemonade"]);
      const day = pick(["monday","tuesday","wednesday","thursday","friday","saturday","sunday","tomorrow","tonight"]);
      const classTopic = pick(["marketing","math","statistics","english","finance","management","economics","accounting","data","research"]);
      const lifeContext = pick(["school","class","classes","work","job","internship","project","exam","presentation","meeting"]);
      const people = pick(["two","three","four","five","six","people","person"]);
      if(food) mem.food = food;
      if(side) mem.side = side;
      if(drink) mem.drink = drink;
      if(day) mem.day = day;
      if(classTopic) mem.classTopic = classTopic;
      if(lifeContext) mem.lifeContext = lifeContext;
      if(people) mem.people = people;
      state.dialogMemory = mem;
      return mem;
    }

    function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }


    function adaptiveRoleplayReply(t, userText){
      const text = cleanWords(userText);
      const mem = rememberFromText(t, userText);
      const turn = state.conversationTurn;

      if(targetLanguage() !== "English"){
        const prompts = Array.isArray(t.nextPrompts) ? t.nextPrompts : [];
        if(turn >= 4){
          state.conversationEnded = true;
          return t.closingPrompt || (targetLanguage()==="German" ? "Danke. Das Gespräch ist abgeschlossen." : "Merci. La conversation est terminée.");
        }
        return prompts[turn] || (targetLanguage()==="German" ? "Das klingt gut. Was würden Sie als Nächstes sagen?" : "Très bien. Que diriez-vous ensuite ?");
      }

      const script = structuredDialogueScripts[t.id] || [];
      if(turn >= 4){
        state.conversationEnded = true;
        return closingForTopic(t);
      }
      if(script[turn]) return script[turn](mem, text);
      return "That makes sense. What would you do next in this situation?";
    }


    function scenarioReply(userText){
      const t=topic();
      const text=cleanWords(userText);
      const turn=state.conversationTurn;
      const polite = hasAny(text, ["please","could","would","may i","can i","excuse me","thank"]);
      const ask = text.includes("?") || hasAny(text, ["where","what","when","how","could","can","would","is there","do you"]);
      if(!text || text.includes("spoken answer recorded")){
        return targetLanguage()==="German" ? "Entschuldigung, ich habe das nicht verstanden. Können Sie es bitte in einem klaren Satz wiederholen?" : targetLanguage()==="French" ? "Désolé, je n’ai pas bien compris. Pouvez-vous répéter avec une phrase claire ?" : "I’m sorry, I didn’t catch that. Could you say it again in one clear sentence?";
      }


      const adaptive = adaptiveRoleplayReply(t, userText);
      if(adaptive) return adaptive;


      if(t.id === "coffee"){
        const drink = ["latte","coffee","cappuccino","americano","cold brew","tea","espresso","mocha"].find(w => text.includes(w));
        const size = ["small","medium","large","tall","grande"].find(w => text.includes(w));
        const milk = ["oat","almond","soy","whole","regular","milk"].find(w => text.includes(w));
        const food = ["muffin","cookie","croissant","scone","banana bread","sandwich","pastry"].find(w => text.includes(w));
        if(turn === 0){
          if(drink) return polite ? `Absolutely — a ${drink}. What size would you like?` : `Sure, I can get you a ${drink}. A more polite way is “Could I get a ${drink}, please?” What size would you like?`;
          return replyByLevel("Sure. What drink would you like?","Of course. What would you like to order today?","Of course — what can I get started for you?");
        }
        if(turn === 1){
          if(size) return `Great, ${size}. What kind of milk would you like?`;
          return "No problem — would you like a small, medium, or large?";
        }
        if(turn === 2){
          if(milk || text.includes("no milk")) return "Perfect. Would you like anything to eat with that?";
          return "Should I make that with regular milk, oat milk, or almond milk?";
        }
        if(turn === 3){
          if(food) return `Great, I’ll add the ${food}. Would you like a receipt?`;
          if(hasAny(text, ["no","nothing","that's all","thats all","all"])) return "No problem. Would you like a receipt?";
          return "We have muffins, croissants, and cookies. Would you like any of those?";
        }
        if(turn === 4){
          if(hasAny(text, ["yes","receipt","email","printed"])) return "Absolutely. I’ll include the receipt. What name should I call for the order?";
          if(hasAny(text, ["no","no receipt"])) return "No problem. What name should I call for the order?";
          return "Would you like the receipt printed or emailed?";
        }
        return "Thanks. Your order is all set and will be ready in a few minutes.";
      }


      if(t.id === "directions"){
        const place = ["station","subway","hotel","museum","cafe","coffee","restaurant","pharmacy","bank","park","airport"].find(w => text.includes(w));
        const transport = ["walk","walking","foot","subway","train","bus","taxi"].find(w => text.includes(w));
        if(turn === 0){
          if(place) return polite ? `Sure, I can help you find the ${place}. Are you planning to walk or take public transport?` : `Sure — the ${place}. Are you walking or taking public transport?`;
          return "Sure. What place are you trying to find?";
        }
        if(turn === 1){
          if(hasAny(text, ["walk","walking","foot"])) return "Great. Walk straight for two blocks, then turn left at the pharmacy. Can you repeat the first step?";
          if(hasAny(text, ["subway","train","bus"])) return "Take the downtown train for two stops. Do you want the nearest entrance?";
          return "Would you rather walk, take the subway, or take a bus?";
        }
        if(turn === 2){
          if(hasAny(text, ["straight","two blocks","turn left","pharmacy"])) return "Exactly. Now ask me how long it will take.";
          if(ask) return "It’s about a seven-minute walk. Would you like a landmark to look for?";
          return "First go straight for two blocks. Try repeating that direction.";
        }
        if(turn === 3){
          if(hasAny(text, ["how long","far","minute","time"])) return "It should take about seven minutes. The entrance has a red sign, so it is easy to spot.";
          if(hasAny(text, ["landmark","recognize","see","sign"])) return "Look for the red subway sign next to the pharmacy.";
          return "You can ask: “How long will it take?”";
        }
        return "You’re welcome. You should be able to find it easily from here.";
      }


      if(t.id === "work"){
        const team = ["marketing","sales","finance","design","product","engineering","hr","operations"].find(w => text.includes(w));
        if(turn === 0){
          if(hasAny(text, ["yes","new","first day","started","start"])) return "Welcome! Nice to meet you. What team are you on?";
          return "I don’t think we’ve met yet. Are you new here?";
        }
        if(turn === 1){
          if(team) return `Great, the ${team} team. How are you finding the office so far?`;
          if(hasAny(text, ["nice to meet","alex","my name"])) return "Nice to meet you too. What team are you joining?";
          return "Which team are you on?";
        }
        if(turn === 2){
          if(hasAny(text, ["good","great","fine","friendly","nice","overwhelming","confusing","lost"])) return "That makes sense for a first day. Have you found the meeting rooms yet?";
          return "First days can be a lot. How are you finding the office so far?";
        }
        if(turn === 3){
          if(hasAny(text, ["meeting room","room","where","berlin","help"])) return "The Berlin room is near the windows at the end of the hall. Would you like to join us for lunch later?";
          return "If you need help, you can ask me where the meeting rooms are.";
        }
        if(turn === 4){
          if(hasAny(text, ["yes","sure","love","great","join"])) return "Perfect. I’ll message you before we leave for lunch.";
          return "No problem. If you change your mind, you’re welcome to join.";
        }
        return "Great talking to you. I’m glad you’re settling in.";
      }


      if(t.id === "hotel"){
        const name = extractName(userText);
        if(turn === 0){
          if(hasAny(text, ["reservation","booking","booked"])) return name ? `Thank you, ${name}. Let me pull up your reservation. Would you like to ask about breakfast or check-out?` : "Of course. What name is the reservation under?";
          return "Welcome. Are you checking in, or do you have a question about your stay?";
        }
        if(turn === 1){
          if(name) return `Thank you, ${name}. I found your booking. Would you like to ask about breakfast, Wi-Fi, or check-out?`;
          if(hasAny(text, ["breakfast","included"])) return "Yes, breakfast is included from 7 to 10. Would you like to ask about check-out?";
          return "Could you give me the name on the reservation?";
        }
        if(turn === 2){
          if(hasAny(text, ["breakfast","included"])) return "Yes, breakfast is included. It’s served downstairs from 7 to 10:30.";
          if(hasAny(text, ["check out","checkout","check-out","what time"])) return "Check-out is at 11 a.m. Would you like information about late check-out?";
          if(hasAny(text, ["wifi","wi fi","internet"])) return "Yes, the Wi-Fi password is printed on your key card holder.";
          return "You can ask about breakfast, check-out, or Wi-Fi.";
        }
        if(turn === 3){
          if(hasAny(text, ["late","later","possible"])) return "Late check-out may be possible tomorrow, depending on availability.";
          if(hasAny(text, ["passport","id","card"])) return "Yes, I’ll need your ID and a card for the security deposit.";
          return "Is there anything else you’d like to confirm before I give you the key card?";
        }
        return "Here is your key card. Enjoy your stay.";
      }


      return (t.nextPrompts && t.nextPrompts[turn]) || "I see. Could you tell me a little more?";
    }
    async function getAIReply(userText){

    async function sendPendingSpeech(){
      const text = (state.pendingTranscript || state.liveTranscript || "").trim();
      if(!text){
        setState({transcriptError:"Please record your answer before sending."});
        return;
      }
      state.pendingTranscript = "";
      handleUserSpeech(text, false);
    }


    function discardPendingSpeech(){
      setState({pendingTranscript:"", liveTranscript:"", transcriptError:""});
    }


    function handleUserSpeech(text, audioOnly=false){
      if(state.conversationEnded){
        setState({pendingTranscript:"", transcriptError:"This conversation is complete. Continue to feedback when you are ready."});
        return;
      }
      if("speechSynthesis" in window) speechSynthesis.cancel();
      const displayText = text;
      const userMsg={role:"user", text:displayText, audioOnly};
      state.messages = state.messages.concat([userMsg]);
      appendTranscript(text);
      state.recognizing=false;
      state.pendingTranscript = "";
      render();


      setTimeout(async () => {
        const reply = await getAIReply(audioOnly ? "" : text);
        if(state.conversationTurn >= 4) {
          state.conversationEnded = true;
          keepRecognitionAlive = false;
          if(recognition){ try{ recognition.stop(); }catch(e){} }
          if(mediaRecorder && mediaRecorder.state === "recording"){ try{ mediaRecorder.stop(); }catch(e){} }
        }
        state.messages = state.messages.concat([{role:"partner", text:reply}]);
        state.conversationTurn += 1;
        updateSession({conversationTurns:state.conversationTurn, conversationEnded:state.conversationEnded}, "conversation_turn");
        render();
        speakText(reply, {female:true, pitch:1.03});
      }, 520);
    }
    function startConversation(){

    function finishConversation(){
      keepRecognitionAlive = false;
      if(recognition){ try{ recognition.stop(); }catch(e){} }
      stopAllAudio();
      releaseMic();
      updateSession({conversationComplete:true, completedAt:new Date().toISOString(), conversationTurns:state.conversationTurn}, "completed");
      state.aiFeedback = null;
      state.feedbackRequested = false;
      nextStep();
    }

      const r = String(role || "").toLowerCase();

      if(targetLanguage()==="German"){
        if(/barista|bedienung|restaurant|kellner|gast/.test(r)) return "👩‍🍳";

        if(/manager|leiter|cheffe|vorgesetz|produkt|present|team|analyst|mitarbeiter|projekt/.test(r)) return "👩‍💼";

        if(/freund|nachbar/.test(r)) return index===0 ? "👩" : "👩‍🦰";
        return index===0 ? "👩" : "👩‍🦱";

      const femaleVoice = index === 0;

      // Match the on-screen emoji to the voice gender used in the listening dialogue.
      if(femaleVoice){
        if(/barista|bedienung|serveuse|kellner|restaurant|café|cafe/.test(r)) return "👩‍🍳";
        if(/rezeption|secrétaire|sekretär|praxis|cabinet|doctor|arzt/.test(r)) return "👩‍⚕️";
        if(/manager|leiter|cheffe|vorgesetz|produkt|present|interven|team|analyst|mitarbeiter|responsable/.test(r)) return "👩‍💼";
        if(/student|étudiant|kurs|cours|camarade|kursteilnehmer/.test(r)) return "👩‍🎓";
        if(/freund|amie|voisin|nachbar/.test(r)) return "👩";
        return "👩";
      }

      if(/barista|bedienung|serveur|kellner|restaurant|café|cafe/.test(r)) return "👨‍🍳";
      if(/rezeption|secrétaire|sekretär|praxis|cabinet|doctor|arzt/.test(r)) return "👨‍⚕️";
      if(/manager|leiter|chef|vorgesetz|produkt|present|interven|team|analyst|mitarbeiter|responsable/.test(r)) return "👨‍💼";

    function detectLikelyIssue(line, topicId){
      const l = cleanWords(line);
      if(!l) return "";
      if(topicId === "coffee"){
        if(l.includes("i want") && !l.includes("please")) return "Try softening “I want...” into “Could I get..., please?”";
        if(l.includes("latte") && !hasAny(l,["small","medium","large","iced","hot"])) return "Add size or temperature to make the order complete.";
      }
      if(topicId === "directions"){
        if(l.includes("where") && l.includes("station") && !l.includes("the")) return "Use the article: “Where is the station?”";
        if(!hasAny(l,["excuse me","could","can","please"]) && hasAny(l,["where","how"])) return "Start with “Excuse me” or “Could you...” to sound more natural.";
      }
      if(topicId === "work"){
        if(l.includes("i new")) return "Say “I’m new here,” not “I new.”";
        if(l.length < 18) return "Add one detail, such as your team or what you need help with.";
      }
      if(topicId === "hotel"){
        if(l.includes("booking") && !l.includes("reservation")) return "At hotels, “reservation” sounds more standard than “booking” in check-in phrases.";
        if(l.includes("check out") && !l.includes("what time")) return "Use the full question: “What time is check-out?”";
      }
      return "";
    }


    function analyzeUserSpeechLines(lines, t){
      const lowerLines = lines.map(x => cleanWords(x));
      const all = lowerLines.join(" ");
      const issues = [];
      const upgrades = [];
      const patterns = [];


      if(!lines.length){
        return {
          issues:["No spoken transcript was captured, so speech-level feedback is limited."],
          upgrades:[`Try one full response using a lesson phrase such as “${(t.phrases||["Could I...?"])[0]}”.`],
          patterns:["Record at least three complete spoken turns before feedback."],
          strongLine:""
        };
      }


      const shortLines = lines.filter(x => x.split(/\s+/).filter(Boolean).length < 5);
      if(shortLines.length){
        issues.push(`${shortLines.length} answer${shortLines.length>1?"s were":" was"} very short, so the conversation had less detail to react to.`);
        upgrades.push(`Expand short answers with one reason: “${shortLines[0]} because ...”`);
      }


      const questionLines = lines.filter(x => /\?|where|what|when|why|how|could|would|do you|are you/i.test(x));
      if(questionLines.length === 0 && state.level !== "Beginner"){
        issues.push("You answered, but you did not ask a follow-up question. This makes the dialogue feel less mutual.");
        upgrades.push("Add one follow-up question, such as “What about you?” or “How does that work for you?”");
      }


      const polite = (all.match(/\b(please|thank|thanks|could|would|may i|excuse me|appreciate)\b/g)||[]).length;
      const serviceTopic = ["restaurant_order","grocery_shopping","make_reservation","change_appointment","hotel","coffee"].includes(t.id);
      if(serviceTopic && polite < 1){
        issues.push("In a service situation, the response would sound more natural with a polite marker.");
        upgrades.push("Use “Could I...?”, “I’d like...”, “please”, or “thank you” in at least one turn.");
      }


      if(/\bi want\b/.test(all) && serviceTopic){
        issues.push("“I want...” can sound direct in restaurants, shops, and reservations.");
        upgrades.push("Upgrade “I want...” to “I’d like...” or “Could I have...?”");
      }


      if(/\b(i am go|i go to|i went to|i going)\b/.test(all)){
        issues.push("There may be a verb-form issue around talking about going somewhere.");
        upgrades.push("Use “I’m going to...” for a current/future plan, or “I go to...” for a routine.");
      }


      if(state.level === "Advanced"){
        const hedges = (all.match(/\b(i think|it seems|possibly|might|could|i’d recommend|given|concerned|provided that|whereas|although)\b/g)||[]).length;
        if(hedges < 2){
          issues.push("For advanced level, the speech could use more hedging or precise reasoning.");
          upgrades.push("Add phrases like “I’d recommend... because...”, “Given the situation...”, or “I’m concerned that...”.");
        }
      }


      if(state.level === "Intermediate"){
        const connectors = (all.match(/\b(because|so|but|although|if|when|after|before)\b/g)||[]).length;
        if(connectors < 2){
          issues.push("The responses need more connectors to show reasons, contrast, or sequence.");
          upgrades.push("Add “because”, “but”, “so”, or “if” to make answers more complete.");
        }
      }


      const phraseHits = (t.phrases||[]).filter(p => {
        const key = cleanWords(p).split(" ").filter(Boolean).slice(0,4).join(" ");
        return key && all.includes(key);
      });
      if(phraseHits.length){
        patterns.push(`You reused lesson language: ${phraseHits.slice(0,2).map(x=>`“${x}”`).join(", ")}.`);
      } else {
        patterns.push(`You did not clearly reuse a target phrase. Try: “${(t.phrases||["Could I...?"])[0]}”.`);
      }


      const longest = lines.slice().sort((a,b)=>b.length-a.length)[0] || lines[0];
      if(longest && longest.split(/\s+/).length >= 7){
        patterns.push(`Your strongest spoken line was: “${longest.slice(0,140)}${longest.length>140?"...":""}”`);
      }


      const topicUpgrade = {
        restaurant_order:"In a restaurant, include main dish + side + drink in one organized sentence.",
        grocery_shopping:"In a shop, combine item + quantity + polite phrase.",
        meet_new_person:"In introductions, answer and ask one question back.",
        weather_chat:"In weather small talk, connect weather to plans or preparation.",
        make_reservation:"In reservations, include day + time + number of people + name.",
        catch_up_friend:"In social catch-ups, add feelings and a follow-up question.",
        call_in_sick:"In workplace absence calls, include reason + availability + handover.",
        change_appointment:"In appointment changes, include original time + preferred new time.",
        presentation_questions:"In presentation Q&A, answer with evidence and avoid overclaiming.",
        deep_friend_discussion:"In discussions, show nuance with partial agreement and contrast.",
        negotiate_deadline:"In deadline negotiation, explain trade-offs and recommend one option.",
        disagree_meeting:"In disagreement, acknowledge the idea, name the risk, and propose a compromise."
      }[t.id] || "Keep your response tied to the role-play goal.";
      upgrades.push(topicUpgrade);


      return {
        issues: issues.length ? issues : ["No major issue detected in your speaking. Next step is to add more detail and stronger phrasing."],
        upgrades: upgrades.slice(0,4),
        patterns: patterns.slice(0,4),
        strongLine: longest || ""
      };
    }
